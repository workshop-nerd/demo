<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Workshop Progetto Nerd 2026</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
      background: #f0f2f5;
      color: #1a1a2e;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
    }

    .card {
      background: #ffffff;
      border: 1px solid #e2e5ea;
      border-radius: 16px;
      max-width: 560px;
      width: 100%;
      padding: 3rem 2.5rem 2.5rem;
      text-align: center;
    }

    .badge {
      display: inline-block;
      background: #eef2ff;
      color: #4f46e5;
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 0.3rem 0.9rem;
      border-radius: 999px;
      margin-bottom: 1.5rem;
    }

    h1 {
      font-size: 1.75rem;
      font-weight: 700;
      line-height: 1.25;
      color: #1a1a2e;
      margin-bottom: 1rem;
    }

    .divider {
      width: 48px;
      height: 3px;
      background: #4f46e5;
      border-radius: 2px;
      margin: 0 auto 1.5rem;
    }

    p {
      font-size: 1rem;
      color: #5a6072;
      line-height: 1.65;
    }

    .status {
      margin-top: 2rem;
      padding: 1rem 1.25rem;
      background: #f8f9fc;
      border: 1px solid #e2e5ea;
      border-radius: 10px;
      font-size: 0.9rem;
      color: #3d4153;
    }

    .dot {
      display: inline-block;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #f59e0b;
      margin-right: 0.4rem;
      vertical-align: middle;
      animation: blink 1.4s ease-in-out infinite;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.25; }
    }
  </style>
</head>
<body>
  <div class="card">
    <span class="badge">Coming soon</span>
    <h1>Workshop Progetto Nerd 2026</h1>
    <div class="divider"></div>
    <p>Stiamo costruendo qualcosa di interessante.<br>Torna presto per scoprirlo.</p>
    <div class="status">
      <span class="dot"></span>
      Work in progress &mdash; Bob è al lavoro
    </div>
  </div>
</body>
</html>
